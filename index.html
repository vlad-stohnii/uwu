<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vulnerable App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Vulnerable Web Application</h1>
        
        <div class="section">
            <h2>Cross-Site Scripting (XSS)</h2>
            <input type="text" id="userInput" placeholder="Enter some text">
            <button id="submitBtn">Submit</button>
            <div id="output"></div>
        </div>
        
        <div class="section">
            <h2>Insecure use of eval</h2>
            <textarea id="userScript" placeholder="Enter JavaScript code"></textarea>
            <button id="runScriptBtn">Run Script</button>
        </div>
        
        <div class="section">
            <h2>Unsecured AJAX request</h2>
            <button id="loadDataBtn">Load User Data</button>
            <div id="ajaxOutput"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
