<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https:; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
    <title>Vulnerable App</title>
    <link rel="stylesheet" href="style.css">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https:; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
</head>
<body>
    <div class="container">
        <h1>Vulnerable Web Application</h1>
        
        <div class="section">
            <h2>Cross-Site Scripting (XSS)</h2>
            <input type="text" id="userInput" placeholder="Enter some text">
            <button onclick="displayUserInput()">Submit</button>
            <div id="output"></div>
        </div>
        
        <div class="section">
            <h2>Insecure use of eval</h2>
            <textarea id="userScript" placeholder="Enter JavaScript code"></textarea>
            <button onclick="executeUserScript()">Run Script</button>
        </div>
        
        <div class="section">
            <h2>Unsecured AJAX request</h2>
            <button onclick="loadUserData()">Load User Data</button>
            <div id="ajaxOutput"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
